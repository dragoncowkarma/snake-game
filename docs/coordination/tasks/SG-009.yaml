acceptance_ids:
  - id: SG-009-AC01
    maps_to:
      - AC-R03
      - AC-R04
    text: >-
      The pull-request quality job keeps workflow-level permissions at exactly
      contents: read. It performs no GitHub Pages metadata/API action and declares
      no pages: write, pages: read, id-token: write, public environment, concurrency,
      or deploy-pages step.
  - id: SG-009-AC02
    maps_to:
      - AC-R03
      - AC-R04
    text: >-
      The quality job derives the current repository name at runtime, normalizes it
      to a trailing-slash base path such as /snake-game/, passes that path to the Vite
      production build, and smoke-tests the resulting existing artifact through the
      production preview. Repository names and /snake-game/ are not hard-coded in
      workflow logic.
  - id: SG-009-AC03
    maps_to:
      - AC-R03
      - AC-R04
    text: >-
      After clean npm ci and all format, lint, typecheck, unit, production build, and
      preview checks pass, the job uploads only dist as a regular CI artifact using a
      current official Actions release pinned to its full commit SHA and annotated
      with its release tag. It neither creates a gh-pages branch nor commits dist.
  - id: SG-009-AC04
    maps_to:
      - AC-R03
    text: >-
      A local /snake-game/ existing-artifact production-preview run proves the
      document and emitted assets load under the repository prefix with zero asset
      404 responses. The workflow provides evidence only; actual Pages publication
      remains zero deployments pending H3a and SG-024.
required_commands:
  - git diff --check
  - git diff --name-only cf811f293918a4b7eed38b5cb44c3673950959cb..HEAD
  - npm ci
  - npm run format:check
  - npm run lint
  - npm run typecheck
  - npm run test
  - npm run build
  - npm run test:e2e
  - npm run verify
  - npm run build -- --base /snake-game/
  - PLAYWRIGHT_BASE_PATH=/snake-game/ PLAYWRIGHT_USE_EXISTING_BUILD=1 npm run test:e2e
  - GITHUB_REPOSITORY=dragoncowkarma/snake-game GITHUB_OUTPUT=<temporary-file> node tooling.config.ts github-output
  - git ls-files dist coverage playwright-report test-results node_modules
  - node <workflow static-policy checker>
required_environment:
  node: 24.x LTS
  package_manager: npm with committed package-lock.json
  browser: Chromium installed by Playwright
implementation_notes:
  - >-
    Use actions/upload-artifact, not configure-pages, upload-pages-artifact, or
    deploy-pages. SG-024 owns the separated Pages build/deploy workflow and its
    pages permissions, configure-pages metadata, release SHA gate, environment, and
    concurrency.
  - >-
    Retain the existing shared repositoryBasePath()/normalizeBasePath() source rather
    than reimplementing repository-name parsing in shell. Do not change it in SG-009.
  - >-
    Resolve the precise current full commit SHA and release comment for every new or
    changed action from its official release at implementation time; do not copy an
    unverified SHA from this draft.
research:
  checked_at: "2026-07-19"
  github_pages_custom_workflows: >-
    https://docs.github.com/en/pages/getting-started-with-github-pages/using-custom-workflows-with-github-pages
  vite_production_build: "https://vite.dev/guide/build.html"
  conclusions:
    - >-
      GitHub's Pages guide reserves configure-pages, upload-pages-artifact, and
      deploy-pages for a Pages deployment workflow; deploy requires pages: write,
      id-token: write, a build dependency, and github-pages environment. None are
      in scope for SG-009's contents-read-only PR quality job.
    - >-
      Vite's production-build guide states that --base rewrites HTML, CSS, and
      imported asset paths for a nested public path, supporting the planned runtime
      repository-base build and preview check.
