scope_boundary: >-
  SG-007 implements the accepted public type skeleton and phase-command policy,
  fixed game configuration, injected RandomSource boundary, row-major free-cell
  food selection, and reset({phase: menu|ready}) initial snapshots. Unit tests live
  beside the domain source under src/domain/** so they remain within the task row's
  ownership. enqueueDirection and the full playing step (movement, queue consumption,
  growth, collision, score/speed update, and won transition) remain SG-010 and must
  not be pre-implemented. This packet also leaves src/ui/contracts.ts untouched;
  deleting that temporary mirror and rewiring UI imports requires a separately
  approved UI/integration allowlist. No public field, command, event, dependency, or
  product meaning may change.
acceptance_ids:
  - id: SG-007-AC01
    maps_to: [SG-003-AC01, SG-003-AC02]
    text: >-
      src/domain exposes the exact accepted Phase, Direction, Difficulty, EndReason,
      Cell, DirectionQueue, GameState, Command, command-policy, DomainEvent,
      RandomSource, reset request/result, and enqueue/transition result type shapes,
      plus the exact 6-phase by 8-command PHASE_COMMAND_POLICY value. No extra public
      GameState field or command/event variant is added.
  - id: SG-007-AC02
    maps_to: [AC-G10, SG-003-AC06]
    text: >-
      reset creates a fresh length-3 head-first snake at (10,10),(9,10),(8,10),
      direction right, empty queue, zero score/foods, difficulty start tick, null
      endReason, and no events. Menu has null food and zero RNG calls; ready has one
      non-overlapping food and exactly one RNG call.
  - id: SG-007-AC03
    maps_to: [AC-G05, AC-G09]
    text: >-
      Food selection enumerates the 20x20 board once in y-major/x-minor row-major
      order, selects from only unoccupied cells with one nextInt(freeCellCount) call,
      performs no retry or modulo coercion, and returns null without touching RNG
      when there are no free cells. SG-010 owns converting that null after growth to
      phase won.
  - id: SG-007-AC04
    maps_to: [SG-003-AC06]
    text: >-
      Two independent injected seeded RandomSource instances with the same seed and
      the same reset request produce value-identical initial snapshots, events, RNG
      call counts, and upper bounds; different valid selected indexes map to the
      documented row-major free cells.
  - id: SG-007-AC05
    maps_to: [SG-003-AC07, D-003]
    text: >-
      Production files under src/domain and src/config import only each other and
      contain no Phaser, DOM, timer, localStorage, Web Audio, wall-clock, Canvas, or
      hidden global-random dependency. No dependency or lockfile changes occur.
  - id: SG-007-AC06
    maps_to: [SG-003-AC03, SG-003-AC04]
    text: >-
      SG-010-owned enqueueDirection and step runtime functions are not implemented
      in this packet. Their accepted queue, READY Right, tick ordering, tail-cell,
      collision-event, score/speed, and won rules remain unchanged in CONTRACTS.md.
