findings:
  - id: DF-SG015-01
    title: "Mute toggle via 'm' key on focused board does not update the visual UI or toggle mute status"
    severity: medium
    connected_ac:
      - AC-U02
      - AC-U05
    description: >-
      Pressing 'm' or 'M' on the focused board dispatches a toggleMute command,
      but the UI shell's local muted state is not updated because ApplicationRouter.dispatch
      treats toggleMute as a no-op comment and never triggers a new snapshot notification.
      Consequently, the mute button text remains 'Mute' and aria-pressed stays 'false'.
    reproduction: >-
      Run npx playwright test tests/e2e/qa-audit.spec.ts and check the expected failure at
      'Audit keyboard mute shortcut toggle'.
