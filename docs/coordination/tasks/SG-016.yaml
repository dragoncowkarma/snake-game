acceptance_ids:
  - >-
    SG-016-AC01 / AC-L01: blur, hidden document, and a true portrait-landscape
    orientation transition issue the same pause command while ordinary resize only
    relayouts; none of those automatic pauses can resume gameplay.
  - >-
    SG-016-AC02 / AC-L02 / AC-L03: every accepted pause preserves only the current
    direction and game snapshot, clears the direction queue and scheduler
    accumulator, ignores pause-time input and delta, requires explicit resume, and
    preserves logical state across ordinary resize.
  - >-
    SG-016-AC03: a versioned, difficulty-qualified localStorage adapter persists only
    slow/normal high scores, mute preference, and last difficulty; unavailable
    storage, malformed JSON, and invalid values use memory fallback without
    interrupting game progress.
  - >-
    SG-016-AC04 / AC-R01: injected read/write storage failures and corrupted values
    are caught at the adapter boundary and do not prevent reset, direction, stepping,
    pausing, resuming, or score recording.
  - >-
    SG-016-AC05 / AC-R02: synthesized Web Audio begins only after a user-gesture
    command, short food/end feedback obeys mute, and absent/throwing/rejected audio
    APIs remain a no-op without blocking game progress.
