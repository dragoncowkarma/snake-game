scope_boundary: >-
  Game rules, Phaser Scene code, domain state transitions, and the application
  command router (which CONTRACTS.md §4/§7 places between input adapters and the
  domain, and which AGENTS.md file ownership assigns to src/game/**/src/main.ts,
  Codex-owned) are out of scope and are not implemented here. src/ui/main.ts's
  `dispatchStub` is intentionally left as a console-logging stub, unchanged from
  SG-006 — wiring a real command router is SG-012/SG-014. This revision only (1)
  replaces src/ui/contracts.ts's hand-maintained type mirror with a type-only
  re-export of the real src/domain/index.ts (SG-007/SG-010), and (2) adds
  src/ui/state.domain-integration.test.ts plus a manual browser reproduction that
  drive SG-006's existing state.ts/app.ts/render.ts with snapshots and events
  produced by the real reset()/enqueueDirection()/step() functions, closing the
  gap SG-006's handoff flagged ("실제 게임플레이로 focus/aria-live/Command 라우팅을
  구동한 종단 증거"). No behavior in app.ts, state.ts, or render.ts was changed;
  only their import source for public types moved from the mirror to the re-export.
acceptance_ids:
  - id: SG-013-AC01
    maps_to: [AC-U06, AC-U07]
    text: >-
      state.ts's focusTargetForTransition and announcementFor, already unit-tested
      against hand-authored GameState/DomainEvent literals in SG-006, additionally
      produce the contractually correct focus target and announcement text when fed
      states/events produced by the real domain reset()/enqueueDirection()/step()
      across a ready->playing start, a movement-only tick, a foodEaten tick, and an
      11-tick wall-collision sequence into gameOver (including the terminal-phase
      no-re-announce case).
  - id: SG-013-AC02
    maps_to: [AC-U06, AC-U07]
    text: >-
      In a real browser (Chromium, dev server, not jsdom), SG-006's actual DOM shell
      (createGameShell from src/ui/app.ts), driven by the same real domain output as
      SG-013-AC01, moves document.activeElement to the board on ready/playing entry
      and to Restart on gameOver entry, updates the #status aria-live region text
      exactly at those same real-domain-driven event points, and updates the visible
      HUD score text from the real domain score — with zero console errors.
  - id: SG-013-AC03
    maps_to: ["type-safety boundary (docs/coordination/CONTRACTS.md §9)"]
    text: >-
      src/ui/contracts.ts contains no duplicated type declarations; it re-exports
      exclusively from src/domain/index.ts, so the UI-layer public type shape and the
      real domain public type shape cannot drift out of sync. tests/fixtures.ts,
      tests/fixtures.test.ts, and tests/helpers/ev-fail-01.ts (Antigravity-owned,
      outside this packet's allowed paths) continue to resolve and typecheck against
      this path unmodified.
