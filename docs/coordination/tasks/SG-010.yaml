scope_boundary: >-
  SG-010 implements the accepted enqueueDirection and step functions, their
  private pure helpers, exports, colocated src/domain unit tests, and the SG-007
  review's explicit food-selection invariant failure. It does not add or alter a
  public type, command, event, product meaning, scheduler/accumulator, command
  router, Phaser/DOM adapter, high-score repository, dependency, or root test
  configuration. AC-G04, AC-G08, and AC-G10 evidence in this packet is limited to
  the domain-owned single-step/tickMs/reset-state portions; renderer-rate scheduling,
  high-score persistence, accumulator reset, and listener cleanup remain their
  already assigned downstream tasks.
acceptance_ids:
  - id: SG-010-AC01
    maps_to: [AC-G01, AC-G02, AC-G03]
    text: >-
      READY accepts Right/Up/Down exactly once as a transition to playing with the
      accepted direction queued, rejects Left, and does not move immediately.
      PLAYING validates against the last accepted reservation, ignores duplicates
      and overflow beyond two entries, rejects reversals before capacity checks,
      and consumes no RNG.
  - id: SG-010-AC02
    maps_to: [AC-G02, AC-G04]
    text: >-
      A playing step consumes at most one queued direction, moves exactly one cell,
      and has no renderer time, delta, FPS, timer, or wall-clock input. It returns a
      fresh value snapshot without mutating the input state.
  - id: SG-010-AC03
    maps_to: [AC-G06, AC-G07]
    text: >-
      Wall is checked before growth/self collision. Non-growth may enter the one
      tail cell removed this tick; self collision checks all other occupied cells.
      Collision does not move the snake or change food/score, preserves the consumed
      direction, clears the queue, and emits exactly one gameEnded event with reason,
      last normal headCell, and actual attemptedCell. Later terminal steps are no-ops.
  - id: SG-010-AC04
    maps_to: [AC-G05, AC-G08]
    text: >-
      Eating grows once, increments foodsEaten and score once, emits one ordered
      foodEaten event, and applies the accepted 5-food acceleration formula with
      difficulty minimum. The state tickMs change is output for the next scheduler
      iteration; SG-010 does not own accumulator subtraction or high-score storage.
  - id: SG-010-AC05
    maps_to: [AC-G05, AC-G09]
    text: >-
      Food is selected uniformly by one injected nextInt call over the row-major
      free-cell list, never by retry. No free cell after growth causes won with null
      food, empty queue, no RNG call, and ordered foodEaten then gameWon events.
      An impossible selected lookup throws an invariant error rather than becoming
      the full-board null sentinel.
  - id: SG-010-AC06
    maps_to: [AC-G10]
    text: >-
      Existing reset still restores score, length, speed, food, direction queue,
      and phase exactly as SG-007 proved. SG-010 introduces no listener or scheduler
      state; downstream integration owns accumulator and listener reset.
  - id: SG-010-AC07
    maps_to: [AC-G01, AC-G02, AC-G03, AC-G04, AC-G05, AC-G06, AC-G07, AC-G08, AC-G09, AC-G10]
    text: >-
      Two independent injected seeded RandomSource instances with the same seed and
      the same reset, direction, and 100-step command sequence produce value-identical
      dispositions, snapshots, event streams, RNG upper-bound calls, and terminal
      behavior. Frozen-input tests and source scans demonstrate no mutation or hidden
      global randomness.
  - id: SG-010-AC08
    maps_to: [D-003, SG-003]
    text: >-
      Production src/domain imports only domain modules and pure src/config values
      and contains no Phaser, DOM, timer, localStorage, Web Audio, Date, Math.random,
      Canvas, scheduler, or mutable global dependency. No dependency or lockfile
      change occurs.
