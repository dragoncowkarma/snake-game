scope_boundary: >-
  Game rules, Phaser Scene code, and domain state transitions are out of scope and
  are not implemented here. src/domain/**, src/game/**, and src/config/** do not
  exist yet (SG-007/SG-012 pending) and are not created by this packet. Where this
  shell needs the public Command/GameState/DomainEvent shapes to compile and to be
  exercised by fixtures, it mirrors docs/coordination/CONTRACTS.md section 1
  type-for-type in src/ui/contracts.ts (types only, no runtime logic, no new public
  fields) with an explicit TODO to delete that mirror and import the real module once
  SG-007 lands. Input is sent only through the public Command union; rendering
  consumes only GameState snapshots and DomainEvent arrays (or hand-authored fixtures
  of the same shape, since no domain implementation exists yet to produce them for
  real gameplay).
acceptance_ids:
  - id: SG-006-AC01
    maps_to: [AC-U01]
    text: >-
      Each phase (menu, ready, playing, paused, gameOver, won) renders exactly the
      controls listed in QA_PLAN.md AC-U01's evidence row (difficulty/Start/Mute;
      D-pad/Mute; D-pad/Pause/Mute; Resume/Mute; Restart/Menu/Mute respectively) plus
      shared HUD (score/best), with zero horizontal scroll and zero pairwise control
      overlap at 320x568. Full multi-environment/H1/real-phone closure remains
      SG-015/SG-018/SG-020.
  - id: SG-006-AC02
    maps_to: [AC-U03]
    text: >-
      Every actionable control is a native button or native semantic form control
      (difficulty), has a non-empty accessible name, is at least 44x44 CSS px, and
      shows a visible focus indicator. Real touch-emulation/device closure remains
      SG-015/SG-018/SG-020.
  - id: SG-006-AC03
    maps_to: [AC-U06]
    text: >-
      Each button is wired through exactly one native `click` listener (no parallel
      `pointerdown` handler), so one activation dispatches exactly one Command.
  - id: SG-006-AC04
    maps_to: [AC-U02, AC-U06]
    text: >-
      A pure keydown-to-Command translator maps Arrow/WASD to `direction`, P/Escape
      to phase-appropriate `pause`/`resume`, M to `toggleMute`, and leaves Enter/Space
      and all other keys untranslated. `preventDefault` is called only for keys that
      actually produced a Command; untranslated keys and all keys while focus is
      outside the board/control region leave default scroll behavior intact.
  - id: SG-006-AC05
    maps_to: [AC-U06]
    text: >-
      Given a hand-authored GameState/DomainEvent fixture sequence shaped like
      DP-B11 (Start, Pause, Resume, gameOver entry, won entry, returnToMenu), the
      shell's focus manager moves `document.activeElement` to the board after
      Start/Resume-shaped transitions into ready/playing, to Resume after entering
      paused, to Restart after entering gameOver/won, and to Start after entering
      menu. This is shell-reaction evidence against fixtures, not a live domain; real
      end-to-end proof against actual gameplay remains SG-013/SG-018/SG-020.
  - id: SG-006-AC06
    maps_to: [AC-U08]
    text: >-
      The board placeholder container is focusable (tabindex 0), exposes a linked
      accessible description via `aria-describedby` naming the actual controls, and
      does not carry `role="application"` or any other unjustified role.
  - id: SG-006-AC07
    maps_to: [AC-U07]
    text: >-
      Given fixture DomainEvent sequences, the aria-live status region updates at
      most once per phase-change/foodEaten/gameEnded/gameWon-shaped fixture event and
      zero times for movement-only fixture ticks that carry no such event. Real
      semantic-score injection and screen-reader transcript evidence remain SG-018's
      DP-B14 and SG-020's MAN-U07-*.
  - id: SG-006-AC08
    maps_to: [AC-U04, AC-U08]
    text: >-
      Design-token text contrast is at least 4.5:1 and UI-boundary contrast is at
      least 3:1 against the shipped background; end/pause/reason status is conveyed
      in visible text, not color alone. Cross-browser/grayscale device closure
      remains SG-020.
  - id: SG-006-AC09
    maps_to: [AC-U09]
    text: >-
      At a 320x568 viewport, mobile control clusters respect `env(safe-area-inset-*)`
      padding, `touch-action: none` is scoped only to the board/D-pad elements (not
      `body`/`html`), and no control intersects the simulated safe-area inset. Real
      notched-device closure remains SG-020.
  - id: SG-006-AC10
    maps_to: [AC-U05]
    text: >-
      Any CSS transition/animation this shell adds (focus/hover only; no game-feedback
      animation is in scope) is disabled under `prefers-reduced-motion: reduce`.
