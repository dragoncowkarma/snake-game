    unexpected = output.lines.map(&:strip).reject(&:empty?) - allowed;
    abort("unexpected paths: #{unexpected.join(",")}") unless unexpected.empty?;
    worktree, clean = Open3.capture2("git", "status", "--porcelain");
    abort("worktree not clean") unless clean.success? && worktree.empty?;
    puts "SG-004 scope and clean worktree: OK"'
