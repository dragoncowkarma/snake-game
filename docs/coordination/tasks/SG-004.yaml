  - >-
    ruby -E UTF-8:UTF-8 -e 'plan = File.read("docs/DEVELOPMENT_PLAN.md",
    encoding: "UTF-8").scan(/`(AC-[GLUR]\d{2})`/).flatten.uniq.sort; rows =
    File.read("docs/coordination/QA_PLAN.md", encoding:
    "UTF-8").scan(/^\|\s*(AC-[GLUR]\d{2})\s*\|/).flatten; abort("AC trace
    mismatch") unless plan.length == 28 && rows.length == 28 && rows.uniq.sort ==
    plan; puts "28 AC rows: OK"'
  - >-
    ruby -E UTF-8:UTF-8 -e 'text = File.read("docs/coordination/QA_PLAN.md",
    encoding: "UTF-8"); allowed = %w[unit contract e2e manual deployed]; lines =
    text.lines.grep(/^\|\s*AC-[GLUR]\d{2}\s*\|/); rows = lines.map { |line|
    line.strip.split("|", -1)[1...-1].map(&:strip) }; abort("bad AC row shape")
    unless rows.length == 28 && rows.all? { |row| row.length == 7 &&
    row.none?(&:empty?) }; rows.each { |row| levels = row[1].split("+").map(&:strip);
    abort("bad level: #{row[0]}") unless !levels.empty? && (levels - allowed).empty?
    }; puts "AC row schema and levels: OK"'
  - >-
    ruby -E UTF-8:UTF-8 -e 'text = File.read("docs/coordination/QA_PLAN.md",
    encoding: "UTF-8"); expected = (1..15).map { |n| format("DP-B%02d", n) };
    rows = text.scan(/^\|\s*(DP-B\d{2})\s*\|/).flatten; abort("boundary row
    mismatch") unless rows.length == 15 && rows.uniq.sort == expected;
    puts "15 boundary rows: OK"'
  - >-
    rg -n '^\| AC \| Level \| Fixture/seed \| Environment \| Failure oracle
    \| Owner/task \| Evidence \|$' docs/coordination/QA_PLAN.md
  - >-
    rg -n '^\| Scenario \| Setup \| Action \| Oracle \| Evidence \|$'
    docs/coordination/QA_PLAN.md
  - >-
    ruby -E UTF-8:UTF-8 -e 'text = File.read("docs/coordination/QA_PLAN.md",
    encoding: "UTF-8"); required = ["320x568", "390x844", "768x1024",
    "1366x768", "1920x1080", "Chromium", "Firefox", "WebKit", "iOS
    Safari", "Android Chrome", "Chrome", "Edge", "Safari", "keyboard-only",
    "VoiceOver", "TalkBack", "reduced motion", "mute", "READY",
    "stepDuration", "headCell", "attemptedCell", "localStorage", "20\u{D68C}",
    "safe-area", "touch-action", "aria-live", "negative control",
