    abort("missing required terms: #{missing.join(",")}") unless missing.empty?;
    puts "required QA terms: OK"'
  - >-
    ruby -E UTF-8:UTF-8 -e 'text = File.read("docs/coordination/QA_PLAN.md",
    encoding: "UTF-8"); placeholder = /\b(?:TBD|TODO)\b|\u{BBF8}\u{C815}/i;
    abort("placeholder remains") if text.match?(placeholder);
