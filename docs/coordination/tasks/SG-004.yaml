acceptance_ids:
  - id: SG-004-AC01
    text: >-
      QA_PLAN.md contains exactly one primary trace row for each of the 28
      authoritative IDs AC-G01 through AC-G10, AC-L01 through AC-L03, AC-U01 through
      AC-U09, and AC-R01 through AC-R06, with no missing, duplicate, or unknown ID.
  - id: SG-004-AC02
    text: >-
      Every AC row supplies non-empty test level(s) from unit, contract, e2e, manual,
      or deployed; a fixture/seed or reasoned N/A; environment or N/A; an observable
      implementation-independent failure oracle; downstream owner/task; and evidence
      format. No TBD remains in the master trace matrix.
  - id: SG-004-AC03
    text: >-
      Numbered setup, action, oracle, and evidence procedures cover all 15 mandatory
      DEVELOPMENT_PLAN boundary scenarios plus the 6-by-8 phase-command policy, READY
      Right, queue cap and consumption, reverse validation, event and RNG order, and
      terminal idempotence.
  - id: SG-004-AC04
    text: >-
      The environment matrix covers 320x568, 390x844, 768x1024, 1366x768, and
      1920x1080; Chromium, Firefox, WebKit and the latest stable desktop browsers;
      iOS Safari and Android Chrome real devices; keyboard-only, VoiceOver, TalkBack,
      reduced motion, mute, safe area, and touch scope. It separates PR, release,
      nightly, manual, and deployed stages and requires no public deploy before H3a.
  - id: SG-004-AC05
    text: >-
      Every manual-only or real-device item has prerequisites, ordered steps, an
      objective numeric or observable PASS condition, and an evidence filename rule.
      Synthetic hidden, orientation, safe-area, or assistive-technology coverage is
      not mislabeled as real-device evidence.
  - id: SG-004-AC06
    text: >-
      The plan uses injected or scripted RNG and delta sequences, contract state and
      event oracles, condition-based waits rather than arbitrary sleep, and failure
      capture of seed, command trace, browser, viewport, and SHA. It records domain
      statement and branch coverage of at least 90% and 100% for named risk branches.
      It also plans a later throwaway negative control: intentionally mutated test or
      product files are never merged, while failure evidence is retained in the
      SG-020 handoff.
  - id: SG-004-AC07
    text: >-
      Each planned check is assigned to the earliest responsible downstream task,
      including SG-005, SG-008, SG-009, SG-011, SG-012, SG-015, SG-016, SG-018,
      SG-020, SG-023, SG-024, SG-026, and SG-028. SG-004 reports a plan only and
      makes no execution PASS, browser, device, accessibility, deployment, or H0b
      claim.
  - id: SG-004-AC08
    text: >-
      Every discovered gap or contradiction is classified blocker, high, medium, or
      low with affected ACs and disposition. A product-meaning or public-contract
      ambiguity is marked decision-needed rather than silently assumed. Supplemental
      non-functional criteria are catalogued separately from the 28 product ACs.
  - id: SG-004-AC09
    text: >-
      The diff is documentation-only, changes only allowed paths, introduces no source,
      tests, dependencies, runtime configuration, contract change, accepted decision,
      or public deployment, and passes every scoped validation command.
