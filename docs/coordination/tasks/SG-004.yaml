  - >-
    ruby -E UTF-8:UTF-8 -e 'require "yaml"; packet =
    YAML.safe_load(File.read("docs/coordination/tasks/SG-004.yaml", encoding:
    "UTF-8"), permitted_classes: [], permitted_symbols: [], aliases: false);
    abort("bad SG-004 packet") unless packet["id"] == "SG-004" &&
    packet["task_revision"] == 1 && packet["status"] == "review" &&
    packet["claim"].is_a?(String) && packet["claim"].start_with?("CLAIM:
    antigravity /") && packet["head_sha"].is_a?(String) &&
    packet["head_sha"].match?(/\A[0-9a-f]{40}\z/) &&
