acceptance_ids:
  - id: SG-003-AC01
    text: >-
      CONTRACTS.md fixes exact TypeScript shapes for GameState, Phase, Cell,
      Direction, Difficulty, Command, DomainEvent, RandomSource, and the
      reset/step/enqueueDirection boundaries without adding source files.
  - id: SG-003-AC02
    text: >-
      A normative phase-by-command table distinguishes accepted, rejected, and
      ignored commands, including READY Right as the only same-direction start and
      Enter/Space never becoming a READY domain command.
  - id: SG-003-AC03
    text: >-
      The contract fixes the ten-stage tick order, free-cell food selection, the
      vacating-tail collision exception, a two-entry direction queue, one consumed
      direction per tick, and reverse-input validation against the last accepted
      direction.
  - id: SG-003-AC04
    text: >-
      gameEnded carries wall/self reason, the last valid headCell, and attemptedCell;
      terminal transitions and full-board victory emit once and cannot step again.
  - id: SG-003-AC05
    text: >-
      Every pause entry preserves direction while clearing queued directions and the
      scheduler accumulator, and the scheduler uses one pre-step stepDuration for
      both eligibility and subtraction so acceleration applies only to the next step.
  - id: SG-003-AC06
    text: >-
      A seeded example and explicit RNG call-order rules demonstrate that the same
      seed plus accepted command stream yields identical snapshots and events.
  - id: SG-003-AC07
    text: >-
      Import boundaries exclude Phaser, DOM, Web Audio, storage, Scene lifecycle,
      Canvas pixels, and renderer-derived rules; no Phaser 3 or Phaser 4 API appears
      in the domain contract.
